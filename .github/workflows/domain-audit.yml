name: domain-audit

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 1 * *'
  pull_request:
    paths:
      - 'src/lib/**'
      - 'src/components/PatternClimateExplorer.tsx'
      - 'package.json'
      - 'vitest.domain.config.ts'
      - '.github/workflows/domain-audit.yml'

jobs:
  exhaustive-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Audit complete supported date-hour domain
        shell: bash
        run: |
          set -o pipefail
          npm run test:domain 2>&1 | tee domain-audit.log
      - name: Upload domain audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mingjing-domain-audit
          path: domain-audit.log
          if-no-files-found: error
