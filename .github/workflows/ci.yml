name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - name: Run build
        run: npm run build 2>&1 | tee build.log
      - name: Comment build failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.existsSync('build.log') ? fs.readFileSync('build.log', 'utf8') : 'build.log not found';
            const tail = log.slice(-6000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CI build failure\n\n\`\`\`text\n${tail}\n\`\`\``
            });
