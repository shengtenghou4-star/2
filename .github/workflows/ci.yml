name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run tests and capture output
        shell: bash
        run: |
          set +e
          npm test > career-test-output.log 2>&1
          code=$?
          echo "$code" > career-test-exit-code.txt
          exit 0
      - name: Upload career test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-test-diagnostics
          path: |
            career-test-output.log
            career-test-exit-code.txt
          if-no-files-found: error
      - name: Enforce test result
        run: test "$(cat career-test-exit-code.txt)" = "0"
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: mingjing-full-web
          path: dist
          if-no-files-found: error
