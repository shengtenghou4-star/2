name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: mingjing-full-web
          path: dist
          if-no-files-found: error
