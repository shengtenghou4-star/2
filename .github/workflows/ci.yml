name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - name: Capture production build
        shell: bash
        run: |
          set +e
          npm run build > build-output.log 2>&1
          code=$?
          echo "$code" > build-exit-code.txt
          exit 0
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mingjing-build-diagnostics
          path: |
            build-output.log
            build-exit-code.txt
          if-no-files-found: error
      - name: Enforce build result
        run: test "$(cat build-exit-code.txt)" = "0"
      - uses: actions/upload-artifact@v4
        with:
          name: mingjing-full-web
          path: dist
          if-no-files-found: error
