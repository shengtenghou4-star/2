逢此日，死别生离是可愁。`,"{xx.bi}":`毕星造作主光前，买得田园有余钱，埋葬此日添官职，田蚕大熟永丰年，开门放水多吉庆，合家人口得安然，婚姻若得逢此日，生得孩儿福寿全。`,"{xx.zi}":`觜星造作有徒刑，三年必定主伶丁，埋葬卒死多因此，取定寅年使杀人，三丧不止皆由此，一人药毒二人身，家门田地皆退败，仓库金银化作尘。`,"{xx.can}":`参星造作旺人家，文星照耀大光华，只因造作田财旺，埋葬招疾哭黄沙，开门放水加官职，房房子孙见田加，婚姻许遁遭刑克，男女朝开幕落花。`,"{xx.jing}":`井星造作旺蚕田，金榜题名第一光，埋葬须防惊卒死，狂颠风疾入黄泉，开门放水招财帛，牛马猪羊旺莫言，贵人田塘来入宅，儿孙兴旺有余钱。`,"{xx.gui}":`鬼星起造卒人亡，堂前不见主人郎，埋葬此日官禄至，儿孙代代近君王，开门放水须伤死，嫁娶夫妻不久长，修土筑墙伤产女，手扶双女泪汪汪。`,"{xx.liu}":`柳星造作主遭官，昼夜偷闭不暂安，埋葬瘟惶多疾病，田园退尽守冬寒，开门放水遭聋瞎，腰驼背曲似弓弯，更有棒刑宜谨慎，妇人随客走盘桓。`,"{xx.xing}":`星宿日好造新房，进职加官近帝王，不可埋葬并放水，凶星临位女人亡，生离死别无心恋，要自归休别嫁郎，孔子九曲殊难度，放水开门天命伤。`,"{xx.zhang}":`张星日好造龙轩，年年并见进庄田，埋葬不久升官职，代代为官近帝前，开门放水招财帛，婚姻和合福绵绵，田蚕人满仓库满，百般顺意自安然。`,"{xx.yi}":`翼星不利架高堂，三年二载见瘟惶，埋葬若还逢此日，子孙必定走他乡，婚姻此日不宜利，归家定是不相当，开门放水家须破，少女恋花贪外郎。`,"{xx.zhen}":`轸星临水造龙宫，代代为官受皇封，富贵荣华增寿禄，库满仓盈自昌隆，埋葬文昌来照助，宅舍安宁不见凶，更有为官沾帝宠，婚姻龙子入龙宫。`},ZHENG:{"{xx.jiao}":`{wx.mu}`,"{xx.jing}":`{wx.mu}`,"{xx.kui}":`{wx.mu}`,"{xx.dou}":`{wx.mu}`,"{xx.kang}":`{wx.jin}`,"{xx.gui}":`{wx.jin}`,"{xx.lou}":`{wx.jin}`,"{xx.niu}":`{wx.jin}`,"{xx.di}":`{wx.tu}`,"{xx.liu}":`{wx.tu}`,"{xx.vei}":`{wx.tu}`,"{xx.nv}":`{wx.tu}`,"{xx.fang}":`{wx.ri}`,"{xx.xing}":`{wx.ri}`,"{xx.mao}":`{wx.ri}`,"{xx.xu}":`{wx.ri}`,"{xx.xin}":`{wx.yue}`,"{xx.zhang}":`{wx.yue}`,"{xx.bi}":`{wx.yue}`,"{xx.wei}":`{wx.yue}`,"{xx.tail}":`{wx.huo}`,"{xx.yi}":`{wx.huo}`,"{xx.zi}":`{wx.huo}`,"{xx.shi}":`{wx.huo}`,"{xx.ji}":`{wx.shui}`,"{xx.zhen}":`{wx.shui}`,"{xx.can}":`{wx.shui}`,"{xx.qiang}":`{wx.shui}`},ANIMAL:{"{xx.jiao}":`{dw.jiao}`,"{xx.dou}":`{dw.xie}`,"{xx.kui}":`{dw.lang}`,"{xx.jing}":`{dw.han}`,"{xx.kang}":`{dw.long}`,"{xx.niu}":`{dw.niu}`,"{xx.lou}":`{dw.gou}`,"{xx.gui}":`{dw.yang}`,"{xx.nv}":`{dw.fu}`,"{xx.di}":`{dw.he}`,"{xx.vei}":`{dw.zhi}`,"{xx.liu}":`{dw.zhang}`,"{xx.fang}":`{dw.tu}`,"{xx.xu}":`{dw.shu}`,"{xx.mao}":`{dw.ji}`,"{xx.xing}":`{dw.ma}`,"{xx.xin}":`{dw.huLi}`,"{xx.wei}":`{dw.yan}`,"{xx.bi}":`{dw.wu}`,"{xx.zhang}":`{dw.lu}`,"{xx.tail}":`{dw.hu}`,"{xx.shi}":`{dw.zhu}`,"{xx.zi}":`{dw.hou}`,"{xx.yi}":`{dw.she}`,"{xx.ji}":`{dw.bao}`,"{xx.qiang}":`{dw.xu}`,"{
